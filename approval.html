<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Wall — Approval Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --warm-white: #fff9f4;
      --ink: #1c1612;
      --ink-light: #6b5c4e;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --green: #2d6a4f;
      --green-light: #d8f3dc;
      --red: #c1121f;
      --red-light: #ffe0e0;
      --amber: #e07c24;
      --amber-light: #fff3e0;
      --border: #e8e0d5;
      --shadow: 0 2px 20px rgba(28,22,18,0.08);
      --shadow-hover: 0 8px 32px rgba(28,22,18,0.14);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,169,110,0.08) 0%, transparent 50%);
    }

    .login-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 56px 48px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--shadow);
    }

    .login-card .icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .login-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 0.9rem;
      color: var(--ink-light);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn-login {
      width: 100%;
      padding: 14px 24px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-login:hover {
      background: var(--ink-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(28,22,18,0.2);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── APP SCREEN ── */
    #app-screen { display: none; }

    header {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 12px rgba(28,22,18,0.06);
    }

    .header-left h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--ink);
    }

    .header-left span {
      font-size: 0.75rem;
      color: var(--ink-light);
      display: block;
      margin-top: -2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-pill {
      font-size: 0.8rem;
      color: var(--ink-light);
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
    }

    .btn-logout {
      font-size: 0.8rem;
      color: var(--red);
      background: none;
      border: 1px solid var(--red);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-logout:hover {
      background: var(--red-light);
    }

    /* ── FILTERS ── */
    .toolbar {
      padding: 24px 32px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.8rem;
      color: var(--ink-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .filter-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--warm-white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--gold); color: var(--ink); }

    .filter-btn.active {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
    }

    .count-badge {
      display: inline-block;
      background: var(--gold-light);
      color: var(--ink);
      font-size: 0.7rem;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 4px;
      font-weight: 500;
    }

    /* ── CARDS ── */
    .cards-container {
      padding: 24px 32px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: var(--shadow);
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .card:hover::before { opacity: 1; }

    .card.processing { opacity: 0.5; pointer-events: none; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
    }

    .card-side {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      margin-top: 2px;
    }

    .status-badge {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
    }

    .status-pending  { background: var(--amber-light); color: var(--amber); }
    .status-approved { background: var(--green-light); color: var(--green); }
    .status-rejected { background: var(--red-light);   color: var(--red); }

    .card-message {
      font-size: 0.9rem;
      color: var(--ink-light);
      line-height: 1.65;
      margin-bottom: 16px;
      font-style: italic;
    }

    .card-meta {
      font-size: 0.72rem;
      color: #aaa;
      margin-bottom: 18px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn-action {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-action:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-approve { background: var(--green-light); color: var(--green); border: 1px solid #b7e4c7; }
    .btn-reject  { background: var(--amber-light); color: var(--amber); border: 1px solid #ffd59e; }
    .btn-delete  { background: var(--red-light);   color: var(--red);   border: 1px solid #ffb3b3; }

    /* ── STATES ── */
    .state-container {
      padding: 80px 32px;
      text-align: center;
      color: var(--ink-light);
    }

    .state-container .state-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .state-container h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; margin-bottom: 8px; color: var(--ink); }
    .state-container p  { font-size: 0.85rem; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--ink);
      color: var(--cream);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .toolbar { padding: 16px 16px 0; }
      .cards-container { padding: 16px 16px 48px; grid-template-columns: 1fr; }
      .login-card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="icon">🕊️</div>
    <h1>Memory Wall</h1>
    <p>Approval panel for wedding wishes.<br>Sign in to review and manage posts.</p>
    <button class="btn-login" id="loginBtn" onclick="signIn()">
      Sign In
    </button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header>
    <div class="header-left">
      <h1>🕊️ Memory Wall</h1>
      <span>Approval Panel</span>
    </div>
    <div class="header-right">
      <span class="user-pill" id="userEmail">—</span>
      <button class="btn-logout" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="toolbar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('pending', this)">
      ⏳ Pending <span class="count-badge" id="count-pending">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('approved', this)">
      ✅ Approved <span class="count-badge" id="count-approved">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('rejected', this)">
      ❌ Rejected <span class="count-badge" id="count-rejected">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('all', this)">
      📋 All <span class="count-badge" id="count-all">0</span>
    </button>
  </div>

  <div id="cards-area"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── MSAL CONFIG ───────────────────────────────────────────────
  const msalConfig = {
    auth: {
      clientId: "85dc0a2e-4972-4c11-a242-dceda101100c",
      authority: "https://azciam.ciamlogin.com/87700922-9176-440e-aad9-75b3541a4b79",
      redirectUri: window.location.origin + "/approval.html",
      postLogoutRedirectUri: window.location.origin + "/approval.html"
    },
    cache: {
      cacheLocation: "sessionStorage",
      storeAuthStateInCookie: false
    }
  };

  const loginRequest = { scopes: ["openid", "profile", "email"] };
  const msalInstance = new msal.PublicClientApplication(msalConfig);

  let currentFilter = 'pending';
  let allPosts = [];

  // ─── INIT ──────────────────────────────────────────────────────
  async function init() {
    await msalInstance.initialize();

    // Handle redirect response
    try {
      const response = await msalInstance.handleRedirectPromise();
      if (response) {
        msalInstance.setActiveAccount(response.account);
      }
    } catch (e) {
      console.error("Redirect error:", e);
    }

    const account = msalInstance.getActiveAccount() || msalInstance.getAllAccounts()[0];

    if (account) {
      msalInstance.setActiveAccount(account);
      showApp(account);
    } else {
      showLogin();
    }
  }

  // ─── AUTH ──────────────────────────────────────────────────────
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }

  function showApp(account) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('userEmail').textContent = account.username || account.name || 'Admin';
    loadPosts();
  }

  async function signIn() {
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    try {
      await msalInstance.loginRedirect(loginRequest);
    } catch (e) {
      console.error("Login error:", e);
      btn.disabled = false;
      btn.textContent = 'Sign In';
      showToast('Login failed. Please try again.', 'error');
    }
  }

  async function signOut() {
    await msalInstance.logoutRedirect();
  }

  // ─── GET TOKEN ─────────────────────────────────────────────────
  async function getToken() {
    const account = msalInstance.getActiveAccount();
    try {
      const result = await msalInstance.acquireTokenSilent({ ...loginRequest, account });
      return result.idToken;;
    } catch (e) {
      // Silent failed — try redirect
      await msalInstance.acquireTokenRedirect({ ...loginRequest, account });
    }
  }

  // ─── LOAD POSTS ────────────────────────────────────────────────
  async function loadPosts() {
    const area = document.getElementById('cards-area');
    area.innerHTML = `<div class="state-container"><div class="spinner"></div><p>Loading posts...</p></div>`;

    try {
      const token = await getToken();
      const res = await fetch('https://api-arvinthaarthi.azurewebsites.net/api/approval', {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      allPosts = await res.json();
      updateCounts();
      renderCards();

    } catch (e) {
      console.error(e);
      area.innerHTML = `<div class="state-container"><div class="state-icon">⚠️</div><h3>Failed to load</h3><p>${e.message}</p></div>`;
    }
  }

  // ─── COUNTS ────────────────────────────────────────────────────
  function updateCounts() {
    const pending  = allPosts.filter(p => !p.isApproved && !p.isRejected).length;
    const approved = allPosts.filter(p => p.isApproved).length;
    const rejected = allPosts.filter(p => p.isRejected).length;

    document.getElementById('count-pending').textContent  = pending;
    document.getElementById('count-approved').textContent = approved;
    document.getElementById('count-rejected').textContent = rejected;
    document.getElementById('count-all').textContent      = allPosts.length;
  }

  // ─── FILTER ────────────────────────────────────────────────────
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  function getFilteredPosts() {
    if (currentFilter === 'pending')  return allPosts.filter(p => !p.isApproved && !p.isRejected);
    if (currentFilter === 'approved') return allPosts.filter(p => p.isApproved);
    if (currentFilter === 'rejected') return allPosts.filter(p => p.isRejected);
    return allPosts;
  }

  // ─── RENDER ────────────────────────────────────────────────────
  function renderCards() {
    const area = document.getElementById('cards-area');
    const posts = getFilteredPosts();

    if (!posts.length) {
      area.innerHTML = `<div class="state-container"><div class="state-icon">🕊️</div><h3>Nothing here</h3><p>No ${currentFilter} posts found.</p></div>`;
      return;
    }

    area.innerHTML = `<div class="cards-container">${posts.map(cardHTML).join('')}</div>`;
  }

  function cardHTML(p) {
    const status = p.isApproved ? 'approved' : p.isRejected ? 'rejected' : 'pending';
    const statusLabel = p.isApproved ? '✅ Approved' : p.isRejected ? '❌ Rejected' : '⏳ Pending';
    const date = p.submittedAt ? new Date(p.submittedAt).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' }) : '—';

    return `
      <div class="card" id="card-${p.rowKey}">
        <div class="card-header">
          <div>
            <div class="card-name">${escHtml(p.senderName || 'Unknown')}</div>
            <div class="card-side">Side: ${escHtml(p.side || '—')}</div>
          </div>
          <span class="status-badge status-${status}">${statusLabel}</span>
        </div>
        <div class="card-message">"${escHtml(p.message || '')}"</div>
        <div class="card-meta">📅 ${date}</div>
        <div class="card-actions">
          <button class="btn-action btn-approve" onclick="doAction('${p.partitionKey}','${p.rowKey}','approve')">✅ Approve</button>
          <button class="btn-action btn-reject"  onclick="doAction('${p.partitionKey}','${p.rowKey}','reject')">❌ Reject</button>
          <button class="btn-action btn-delete"  onclick="doAction('${p.partitionKey}','${p.rowKey}','delete')">🗑️ Delete</button>
        </div>
      </div>`;
  }

  // ─── ACTION ────────────────────────────────────────────────────
  async function doAction(partitionKey, rowKey, action) {
    const card = document.getElementById(`card-${rowKey}`);
    card.classList.add('processing');

    try {
      const token = await getToken();
      const res = await fetch('/api/approval', {
        method: action === 'delete' ? 'DELETE' : 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ partitionKey, rowKey, action })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      // Update local state
      if (action === 'delete') {
        allPosts = allPosts.filter(p => p.rowKey !== rowKey);
      } else {
        allPosts = allPosts.map(p => p.rowKey === rowKey ? {
          ...p,
          isApproved: action === 'approve',
          isRejected: action === 'reject'
        } : p);
      }

      updateCounts();
      renderCards();
      showToast(`Post ${action}d successfully!`, 'success');

    } catch (e) {
      console.error(e);
      card.classList.remove('processing');
      showToast(`Failed to ${action} post.`, 'error');
    }
  }

  // ─── HELPERS ───────────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── START ─────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
