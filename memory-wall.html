<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Memory Wall | Arvinth & Aarthi</title>
    <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Dancing+Script&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/memory-wall.css" />
</head>
<body class="brideAndGroomSection">
    <div class="sakura-falling"></div>

    <div class="container-fluid memory-container">
        <div class="row h-100">
            <div class="col-lg-5 form-section order-2 order-lg-1">
                <div class="glass-form p-4 rounded-4 shadow">
                    <h2 class="font-esthetic text-white text-center mb-4" style="font-size: 2.5rem;">Leave a Message</h2>
                    <form id="memoryForm">
                        <div class="mb-3">
                            <input type="text" id="userName" class="form-control custom-input" placeholder="Your Name *" required>
                        </div>
                        <div class="mb-3 text-center side-selector">
                            <label class="text-white me-3">Whose side are you on?</label><br>
                            <div class="form-check form-check-inline mt-2">
                                <input class="form-check-input" type="radio" name="side" id="brideSide" value="bride" checked>
                                <label class="form-check-label text-white" for="brideSide">Aarthi (Bride)</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="side" id="groomSide" value="groom">
                                <label class="form-check-label text-white" for="groomSide">Arvinth (Groom)</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <textarea id="userMessage" class="form-control custom-input" rows="4" placeholder="Your wishes..." required></textarea>
                        </div>
                        <button type="submit" class="btn w-100 submit-btn">Send Love <i class="fa-solid fa-heart ms-2"></i></button>
                    </form>
                </div>
            </div>

            <div class="col-lg-7 wall-section order-1 order-lg-2">
                <div id="messagesWrapper" class="messages-container p-3">
                    </div>
            </div>
        </div>
    </div>

    <nav class="navbar bg-dark navbar-expand fixed-bottom rounded-top-4 border-top p-0" id="navbar-menu">
      <ul class="navbar-nav nav-justified w-100 align-items-center">
        <li class="nav-item">
            <a class="nav-link" href="index.html#home">
                <i class="fa-solid fa-envelope-open-text"></i>
                <span style="font-size: 0.7rem;">Invite</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="index.html#wedding-date">
                <i class="fa-solid fa-calendar-check"></i>
                <span style="font-size: 0.7rem;">Date</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="gallery.html">
                <i class="fa-solid fa-images"></i>
                <span style="font-size: 0.7rem;">Gallery</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="memory-wall.html">
                <i class="fa-solid fa-pen-nib"></i>
                <span style="font-size: 0.7rem;">Wishes</span>
            </a>
        </li>
      </ul>
    </nav>

    <div class="fixed-bottom text-end pe-3 pb-2 d-none d-md-block" style="z-index: 1200; pointer-events: none;">
        <p style="color: rgba(255,255,255,0.6) !important; font-size: 0.8rem; margin: 0;">Built with love by Arvinth</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
        // Placeholder API Logic
        const dummyData = [
            { name: "Suresh", side: "groom", message: "Congratulations brother! So happy for you and Aarthi." },
            { name: "Priya", side: "bride", message: "Aarthi, you're going to be the most beautiful bride ever!" },
            { name: "Vijay", side: "groom", message: "Villupuram is ready for the biggest celebration!" }
        ];

        function renderMessages() {
            const wrapper = document.getElementById('messagesWrapper');
            wrapper.innerHTML = dummyData.map(msg => `
                <div class="message-card ${msg.side}-card">
                    <fieldset class="message-fieldset">
                        <legend class="message-legend">
                            <i class="fa-solid fa-heart"></i> ${msg.name}
                        </legend>
                        <p>${msg.message}</p>
                    </fieldset>
                </div>
            `).join('');
        }

        document.getElementById('memoryForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Message sent! (Dummy Action)");
        };

        window.onload = renderMessages;
    </script>
</body>
</html>
