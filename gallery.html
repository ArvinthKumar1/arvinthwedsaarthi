<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="shortcut icon" href="favicon.png" type="image/png" />
    <meta name="theme-color" content="#6e57e0" />
    <title>Gallery | Arvinth & Aarthi Wedding Invite</title>
    <link href="https://fonts.googleapis.com/css?family=Arvo" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Dancing+Script&amp;display=swap" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.16/dist/css/uikit.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="brideAndGroomSection">
    <div class="sakura-falling"></div>
    
    <div class="container-fluid py-5" style="min-height: 100vh; padding-bottom: 100px;">
      <div class="header-bg text-center mb-4">
        <h2 class="font-esthetic py-2 home_txt uk-heading-line" style="font-size: 2.5rem; color: white;">
          Engagement Gallery
        </h2>
      </div>

      <div class="row align-items-center h-100">
        <div class="col-lg-7 px-lg-5">
          <div id="engagementGallery" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner rounded-4 shadow">
              <div class="carousel-item active">
                <img src="assets/image/gallery/1.jpg" class="d-block w-100 gallery-img" alt="Gallery 1">
              </div>
              <div class="carousel-item">
                <img src="assets/image/gallery/2.jpg" class="d-block w-100 gallery-img" alt="Gallery 2">
              </div>
              <div class="carousel-item">
                <img src="assets/image/gallery/3.jpg" class="d-block w-100 gallery-img" alt="Gallery 3">
              </div>
              <div class="carousel-item">
                <img src="assets/image/gallery/4.jpg" class="d-block w-100 gallery-img" alt="Gallery 4">
              </div>
              <div class="carousel-item">
                <img src="assets/image/gallery/5.jpg" class="d-block w-100 gallery-img" alt="Gallery 5">
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#engagementGallery" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#engagementGallery" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="col-lg-5 text-center mt-4 mt-lg-0">
          <div class="p-4 rounded-4" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);">
            <i class="fa-solid fa-camera-retro mb-3" style="font-size: 2rem; color: #f8d477;"></i>
            <p class="home_txt cherished-text" style="font-size: 1.5rem; line-height: 1.6;">
              Cherished moments from our Engagement journey!
            </p>
            <hr style="color: #f8d477; width: 50%; margin: 20px auto;">
            <p style="font-style: italic; opacity: 0.8;">Captured with love</p>
          </div>
        </div>
      </div>
    </div>

    <!-- <div class="footer fixed-bottom mb-5 pb-4 text-center">
      <p style="color: white !important;">Built with love by Arvinth</p>
    </div> -->

    <nav class="navbar bg-dark navbar-expand fixed-bottom rounded-top-4 border-top p-0" id="navbar-menu">
    <ul class="navbar-nav nav-justified w-100 align-items-center">
        <li class="nav-item">
            <a class="nav-link" href="index.html#home">
                <i class="fa-solid fa-envelope-open-text"></i>
                <span style="font-size: 0.7rem;">Invite</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="index.html#wedding-date">
                <i class="fa-solid fa-calendar-check"></i>
                <span style="font-size: 0.7rem;">Date</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="gallery.html">
                <i class="fa-solid fa-images"></i>
                <span style="font-size: 0.7rem;">Gallery</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="memory-wall.html">
                <i class="fa-solid fa-pen-nib"></i>
                <span style="font-size: 0.7rem;">Wishes</span>
            </a>
        </li>
      </ul>
    </nav>

    <style>
      .gallery-img {
        max-height: 500px;
        min-height: 400px;
        object-fit: contain;
        background: rgba(255,255,255,0.2);
        padding: 15px;
      }
      .cherished-text {
        font-family: 'Dancing Script', cursive;
        color: white;
      }
      @media (max-width: 768px) {
        .gallery-img {
          max-height: 300px;
          min-height: 300px;
        }
      }
      /* 1. Lock the Frame Height */
      .carousel-inner {
          height: 500px; /* This keeps the outer layout constant */
          background: rgba(255, 255, 255, 0.05);
          backdrop-filter: blur(5px);
      }

      .gallery-img {
          width: 100%;
          height: 100% !important; /* Force image to fill the locked frame */
          object-fit: contain; /* Keeps the whole photo visible without cropping */
          padding: 10px;
      }

      /* 2. Responsive adjustment for Mobile */
      @media (max-width: 768px) {
          .carousel-inner {
              height: 350px; /* Constant height for mobile */
          }
          .gallery-img {
              padding: 5px;
          }
      }

      /* 3. Consistency with your Glossy theme */
      .cherished-text {
          font-family: 'Dancing Script', cursive;
          color: white;
          text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
